name: Workflows, Jobs, and Steps
on:
  push:
    paths:
      - '.github/workflows/03-core-features--03-workflows-jobs-steps.yaml'
    branches:
      - main
  workflow_dispatch:
jobs:
  jobs-1:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This is the first job"
      - run: echo "A job consist of"
      - run: echo "one or more steps"
      - run: echo "which run sequentially in the same runner environment"
  jobs-2:
    runs-on: ubuntu-latest
    needs:
      - jobs-1
    steps:
      - run: echo "This is the second job"
      - run: echo "A job can depend on another job"
      - run: echo "by using the needs keyword"
      - run: echo "which allows you to control the order of execution"
  jobs-3:
    runs-on: ubuntu-latest
    needs:
      - jobs-1
      - jobs-2
    steps:
      - run: echo "This is the third job"
      - run: echo "A job can depend on multiple jobs"
      - run: echo "by using the needs keyword with a list of job names"
  jobs-4:
    runs-on: ubuntu-latest
    needs:
      - jobs-2
      - jobs-3
    steps:
      - echo "Workflows from a Directed Acyclic Graph (DAG)"