name: coverage
on: 
  pull_request_target:
    branches:
      - 'main'
      - 'master'
    type: [opened, reopened, synchronize]
  push:
    paths:
      - 'README.md'
      - '**.yaml'
      - '!docs/**'
      - '**.js'
    branches:
      - 'main'
      - 'release/**'
      - '!dev'
  workflow_dispatch:
jobs:
  coverage-report:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull_requests: write
      contents: read
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - uses: ArtiomTr/jest-coverage-report-action@v2