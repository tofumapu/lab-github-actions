name: coverage
on: 
  pull_request_target:
    branches:
      - 'main'
      - 'master'
    type: [opened, reopened, synchronize]
  push:
    paths:
      - 'README.md'
      - '**.yaml'
      - '!docs/**'
      - '**.js'
    branches:
      - 'main'
      - 'release/**'
      - '!dev'
  workflow_dispatch:
jobs:
  coverage-report:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v3
      - run: npm install
      - uses: codecov/codecov-action@v5
    with:
      fail_ci_if_error: true
      files: ./coverage1.xml,./coverage2.xml
      flags: unittests
      name: codecov-umbrella
      token: ${{ secrets.CODECOV_TOKEN }}
      verbose: true